services:
  # ── PostgreSQL Database ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: avry-postgres
    restart: unless-stopped
    networks:
      - aivory-network
    environment:
      - POSTGRES_USER=aivory
      - POSTGRES_PASSWORD=AivoryApp2026!@#123
      - POSTGRES_DB=aivory
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aivory -d aivory"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "5432:5432"

  # ── Reverse Proxy ──────────────────────────────────────────────────────────
  traefik:
    image: traefik:v2.11
    container_name: avry-traefik
    restart: unless-stopped
    networks:
      - aivory-network
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - "--api.insecure=false"
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=aivory-network"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
      - "--accesslog=true"

  # ── Main Website / Landing (Next.js 14, built from this directory) ─────────
  # Catch-all priority=1: serves /, /blog, /careers, /about, /product, etc.
  # The Next.js app handles /blog and /careers as internal pages which call
  # the API at /api/blog and /api/careers via NEXT_PUBLIC_BLOG_URL / NEXT_PUBLIC_CAREERS_URL.
  avry-website:
    build: .
    container_name: avry-website
    restart: unless-stopped
    networks:
      - aivory-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=aivory-network"
      - "traefik.http.routers.main-app.rule=PathPrefix(`/`)"
      - "traefik.http.routers.main-app.entrypoints=web"
      - "traefik.http.routers.main-app.priority=1"
      - "traefik.http.services.main-app.loadbalancer.server.port=3000"

  # ── Blog API Service (port 8089, routed via /api/blog with strip) ──────────
  # Browser calls this via NEXT_PUBLIC_BLOG_URL=http://IP/api/blog
  avry-blog:
    build:
      context: ./services/avry-blog
      dockerfile: Dockerfile
    container_name: avry-blog
    restart: unless-stopped
    working_dir: /app
    networks:
      - aivory-network
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=aivory-network"
      - "traefik.http.routers.blog.rule=PathPrefix(`/api/blog`)"
      - "traefik.http.routers.blog.entrypoints=web"
      - "traefik.http.routers.blog.priority=10"
      - "traefik.http.services.blog.loadbalancer.server.port=8089"
      - "traefik.http.routers.blog.middlewares=blog-stripprefix"
      - "traefik.http.middlewares.blog-stripprefix.stripprefix.prefixes=/api/blog"
    depends_on:
      traefik:
        condition: service_started
      postgres:
        condition: service_healthy

  # ── Careers API Service (port 8090, routed via /api/careers with strip) ────
  # Browser calls this via NEXT_PUBLIC_CAREERS_URL=http://IP/api/careers
  avry-careers:
    build:
      context: ./services/avry-careers
      dockerfile: Dockerfile
    container_name: avry-careers
    restart: unless-stopped
    working_dir: /app
    networks:
      - aivory-network
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - SMTP_HOST=${SMTP_HOST:-localhost}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-careers@aivory.id}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=aivory-network"
      - "traefik.http.routers.careers.rule=PathPrefix(`/api/careers`)"
      - "traefik.http.routers.careers.entrypoints=web"
      - "traefik.http.routers.careers.priority=10"
      - "traefik.http.services.careers.loadbalancer.server.port=8090"
      - "traefik.http.routers.careers.middlewares=careers-stripprefix"
      - "traefik.http.middlewares.careers-stripprefix.stripprefix.prefixes=/api/careers"
    depends_on:
      traefik:
        condition: service_started
      postgres:
        condition: service_healthy

  avry-diagnostics:
    build:
      context: ./services/avry-diagnostics
      dockerfile: Dockerfile
    container_name: avry-diagnostics
    restart: unless-stopped
    networks:
      - aivory-network
    environment:
      - PORT=8082
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=aivory-network"
      - "traefik.http.routers.diagnostics.rule=PathPrefix(`/api/diagnostics`)"
      - "traefik.http.routers.diagnostics.entrypoints=web"
      - "traefik.http.routers.diagnostics.priority=10"
      - "traefik.http.services.diagnostics.loadbalancer.server.port=8082"
      - "traefik.http.routers.diagnostics.middlewares=diagnostics-stripprefix"
      - "traefik.http.middlewares.diagnostics-stripprefix.stripprefix.prefixes=/api/diagnostics"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy

  avry-blueprint:
    build:
      context: ./services/avry-blueprint
      dockerfile: Dockerfile
    container_name: avry-blueprint
    restart: unless-stopped
    networks:
      - aivory-network
    environment:
      - PORT=8083
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=aivory-network"
      - "traefik.http.routers.blueprint.rule=PathPrefix(`/api/blueprint`)"
      - "traefik.http.routers.blueprint.entrypoints=web"
      - "traefik.http.routers.blueprint.priority=10"
      - "traefik.http.services.blueprint.loadbalancer.server.port=8083"
      - "traefik.http.routers.blueprint.middlewares=blueprint-stripprefix"
      - "traefik.http.middlewares.blueprint-stripprefix.stripprefix.prefixes=/api/blueprint"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy

  avry-workflows:
    build:
      context: ./services/avry-workflows
      dockerfile: Dockerfile
    container_name: avry-workflows
    restart: unless-stopped
    networks:
      - aivory-network
    environment:
      - PORT=8082
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=aivory-network"
      - "traefik.http.routers.workflows.rule=PathPrefix(`/api/workflows`)"
      - "traefik.http.routers.workflows.entrypoints=web"
      - "traefik.http.routers.workflows.priority=10"
      - "traefik.http.services.workflows.loadbalancer.server.port=8082"
      - "traefik.http.routers.workflows.middlewares=workflows-stripprefix"
      - "traefik.http.middlewares.workflows-stripprefix.stripprefix.prefixes=/api/workflows"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy

  avry-payments:
    build:
      context: ./services/avry-payments
      dockerfile: Dockerfile
    container_name: avry-payments
    restart: unless-stopped
    networks:
      - aivory-network
    environment:
      - PORT=8085
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - MIDTRANS_SERVER_KEY=${MIDTRANS_SERVER_KEY}
      - MIDTRANS_CLIENT_KEY=${MIDTRANS_CLIENT_KEY}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=aivory-network"
      - "traefik.http.routers.payments.rule=PathPrefix(`/api/payments`)"
      - "traefik.http.routers.payments.entrypoints=web"
      - "traefik.http.routers.payments.priority=10"
      - "traefik.http.services.payments.loadbalancer.server.port=8085"
      - "traefik.http.routers.payments.middlewares=payments-stripprefix"
      - "traefik.http.middlewares.payments-stripprefix.stripprefix.prefixes=/api/payments"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy

  avry-roadmap:
    build:
      context: ./services/avry-roadmap
      dockerfile: Dockerfile
    container_name: avry-roadmap
    restart: unless-stopped
    networks:
      - aivory-network
    environment:
      - PORT=8084
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=aivory-network"
      - "traefik.http.routers.roadmap.rule=PathPrefix(`/api/roadmap`)"
      - "traefik.http.routers.roadmap.entrypoints=web"
      - "traefik.http.routers.roadmap.priority=10"
      - "traefik.http.services.roadmap.loadbalancer.server.port=8084"
      - "traefik.http.routers.roadmap.middlewares=roadmap-stripprefix"
      - "traefik.http.middlewares.roadmap-stripprefix.stripprefix.prefixes=/api/roadmap"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy

networks:
  aivory-network:
    external: true

volumes:
  postgres_data: