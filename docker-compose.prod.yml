services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: avry-postgres
    restart: unless-stopped
    networks:
      - aivory-network
    environment:
      - POSTGRES_USER=aivory
      - POSTGRES_PASSWORD=AivoryApp2026!@#123
      - POSTGRES_DB=aivory
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aivory -d aivory"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "5432:5432"

  # ── Traefik ────────────────────────────────────────────────────────────────
  traefik:
    image: traefik:v2.11
    container_name: avry-traefik
    restart: unless-stopped
    networks:
      - aivory-network
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/ubuntu/AVRY-V2-Main/traefik/dynamic:/etc/traefik/dynamic:ro
      - /home/ubuntu/AVRY-V2-Main/traefik/letsencrypt:/letsencrypt
    command:
      - "--api.insecure=false"
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=aivory-network"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.middlewares=aivory-secure@file"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.middlewares=aivory-secure@file"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@aivory.id"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--log.level=INFO"
      - "--accesslog=true"

  # ── Main Website (landing, /blog, /careers — catch-all priority=1) ─────────
  avry-website:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: https://api.aivory.id
        NEXT_PUBLIC_BACKEND_URL: https://api.aivory.id
        NEXT_PUBLIC_BLOG_URL: https://aivory.id/api/blog
        NEXT_PUBLIC_CAREERS_URL: https://aivory.id/api/careers
        NEXT_PUBLIC_DIAGNOSTICS_URL: https://api.aivory.id/diagnostics
        NEXT_PUBLIC_BLUEPRINT_URL: https://api.aivory.id/blueprint
        NEXT_PUBLIC_ADMIN_DASHBOARD_URL: https://admin.aivory.id/admin
        NEXT_PUBLIC_WORKFLOWS_URL: https://api.aivory.id/workflows
        NEXT_PUBLIC_PAYMENTS_URL: https://api.aivory.id/payments
        NEXT_PUBLIC_ROADMAP_URL: https://api.aivory.id/roadmap
    container_name: avry-website
    restart: unless-stopped
    networks:
      - aivory-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=aivory-network"
      - "traefik.http.routers.main-app.rule=(Host(`aivory.id`) || Host(`www.aivory.id`) || Host(`stag.aivory.id`) || Host(`x.aivory.uk`)) && PathPrefix(`/`)"
      - "traefik.http.routers.main-app.entrypoints=websecure,web"
      - "traefik.http.routers.main-app.tls.certresolver=letsencrypt"
      - "traefik.http.routers.main-app.priority=1"
      - "traefik.http.routers.main-app-api.rule=(Host(`aivory.id`) || Host(`www.aivory.id`) || Host(`stag.aivory.id`) || Host(`x.aivory.uk`)) && PathPrefix(`/api/exchange-rate`)"
      - "traefik.http.routers.main-app-api.entrypoints=websecure,web"
      - "traefik.http.routers.main-app-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.main-app-api.priority=20"
      - "traefik.http.services.main-app.loadbalancer.server.port=3000"

  # ── User Dashboard (port 9001) ─────────────────────────────────────────────
  avry-user-dashboard:
    build:
      context: ./frontend/avry-user-dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: https://api.aivory.id
        NEXT_PUBLIC_BACKEND_URL: https://api.aivory.id
        NEXT_PUBLIC_DIAGNOSTICS_URL: https://api.aivory.id/diagnostics
        NEXT_PUBLIC_BLUEPRINT_URL: https://api.aivory.id/blueprint
        NEXT_PUBLIC_ADMIN_DASHBOARD_URL: https://admin.aivory.id/admin
        NEXT_PUBLIC_WORKFLOWS_URL: https://api.aivory.id/workflows
        NEXT_PUBLIC_PAYMENTS_URL: https://api.aivory.id/payments
        NEXT_PUBLIC_ROADMAP_URL: https://api.aivory.id/roadmap
    container_name: avry-user-dashboard
    restart: unless-stopped
    networks:
      - aivory-network
      - aivory_aivory-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9001:9001"
    environment:
      - PORT=9001
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_URL=https://aivory.id/dashboard
      # ── Backend services (no compromised defaults — requireEnv enforces these)
      - VPS_BRIDGE_URL=http://host.docker.internal:3003
      - ZEROCLAW_WEBHOOK_URL=http://host.docker.internal:3003/webhook
      - N8N_AS_CODE_URL=http://host.docker.internal:3500
      - N8N_BASE_URL=http://n8n:5678
      - N8N_API_KEY=${N8N_API_KEY}
      - N8N_MCP_URL=http://n8n-mcp:3020
      - N8N_MCP_AUTH_TOKEN=${N8N_MCP_AUTH_TOKEN}
      - COMPOSIO_API_KEY=${COMPOSIO_API_KEY}
      - COMPOSIO_REDIRECT_URL=${COMPOSIO_REDIRECT_URL}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=aivory-network"
      - "traefik.http.routers.user-dashboard.rule=(Host(`aivory.id`) || Host(`www.aivory.id`) || Host(`stag.aivory.id`) || Host(`dashboard.aivory.id`) || Host(`app.aivory.id`)) && PathPrefix(`/dashboard`)"
      - "traefik.http.routers.user-dashboard.entrypoints=web,websecure"
      - "traefik.http.routers.user-dashboard.tls=true"
      - "traefik.http.routers.user-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.user-dashboard.priority=10"
      - "traefik.http.services.user-dashboard.loadbalancer.server.port=9001"
      # Browser-side fetches go to /api/* (without basePath). Traefik adds the
      # /dashboard prefix before forwarding so Next.js basePath router matches.
      # Priority 5 < blog/careers (10) so those keep going to their services.
      - "traefik.http.routers.user-dashboard-api.rule=(Host(`aivory.id`) || Host(`www.aivory.id`) || Host(`stag.aivory.id`) || Host(`dashboard.aivory.id`) || Host(`app.aivory.id`)) && PathPrefix(`/api`)"
      - "traefik.http.routers.user-dashboard-api.entrypoints=web,websecure"
      - "traefik.http.routers.user-dashboard-api.tls=true"
      - "traefik.http.routers.user-dashboard-api.priority=5"
      - "traefik.http.routers.user-dashboard-api.service=user-dashboard"
      - "traefik.http.routers.user-dashboard-api.middlewares=user-dashboard-addprefix"
      - "traefik.http.middlewares.user-dashboard-addprefix.addprefix.prefix=/dashboard"

  # ── Admin Dashboard (port 9002) ────────────────────────────────────────────
  avry-admin-dashboards:
    build:
      context: ./frontend/avry-admin-dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.aivory.id
        NEXT_PUBLIC_BLOG_SERVICE_URL: https://aivory.id/api/blog
        NEXT_PUBLIC_CAREERS_SERVICE_URL: https://aivory.id/api/careers
        NEXT_PUBLIC_CAREERS_URL: https://aivory.id/api/careers
        NEXT_PUBLIC_BACKEND_URL: https://api.aivory.id
    container_name: avry-admin-dashboards
    restart: unless-stopped
    networks:
      - aivory-network
    ports:
      - "9002:9002"
    environment:
      - PORT=9002
      - NODE_ENV=production
      - BACKEND_SERVICE_URL=http://avry-backend:8081
      - PAYMENTS_SERVICE_URL=http://avry-payments:3030
      - DIAGNOSTICS_SERVICE_URL=http://avry-diagnostics:8082
      - BLUEPRINT_SERVICE_URL=http://avry-blueprint:8083
      - ROADMAP_SERVICE_URL=http://avry-roadmap:8084
      - WORKFLOWS_SERVICE_URL=http://avry-workflows:8082
      - VPS_PANEL_API_TOKEN=${VPS_PANEL_API_TOKEN}
      - BLOG_SERVICE_URL=http://avry-blog:8089
      - CAREERS_SERVICE_URL=http://avry-careers:8090
      - SETUP_SECRET=${INTERNAL_TOKEN:-aivory-internal-2026}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=aivory-network"
      - "traefik.http.routers.admin-app.rule=(Host(`aivory.id`) || Host(`www.aivory.id`) || Host(`stag.aivory.id`) || Host(`admin.aivory.id`)) && PathPrefix(`/admin`)"
      - "traefik.http.routers.admin-app.entrypoints=web,websecure"
      - "traefik.http.routers.admin-app.tls=true"
      - "traefik.http.routers.admin-app.tls.certresolver=letsencrypt"
      - "traefik.http.routers.admin-app.priority=10"
      - "traefik.http.services.admin-app.loadbalancer.server.port=9002"

  # ── Backend API (port 8081) ────────────────────────────────────────────────
  avry-backend:
    build:
      context: ./backend/avry-backend
      dockerfile: Dockerfile
    container_name: avry-backend
    restart: unless-stopped
    networks:
      - aivory-network
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ENVIRONMENT=production
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME:-}
      - TELEGRAM_WEBHOOK_SECRET=${TELEGRAM_WEBHOOK_SECRET:-}
      - TELEGRAM_AGENT_GATEWAY_URL=${TELEGRAM_AGENT_GATEWAY_URL:-}
      - TELEGRAM_GATEWAY_TOKEN=${TELEGRAM_GATEWAY_TOKEN:-}
      - TELEGRAM_BOT_TOKEN_CUSTOMER_SERVICE=${TELEGRAM_BOT_TOKEN_CUSTOMER_SERVICE:-}
      - TELEGRAM_BOT_USERNAME_CUSTOMER_SERVICE=${TELEGRAM_BOT_USERNAME_CUSTOMER_SERVICE:-}
      - TELEGRAM_BOT_TOKEN_LEADS_QUALIFIER=${TELEGRAM_BOT_TOKEN_LEADS_QUALIFIER:-}
      - TELEGRAM_BOT_USERNAME_LEADS_QUALIFIER=${TELEGRAM_BOT_USERNAME_LEADS_QUALIFIER:-}
      - TELEGRAM_BOT_TOKEN_FINANCE_INVOICE_OPS=${TELEGRAM_BOT_TOKEN_FINANCE_INVOICE_OPS:-}
      - TELEGRAM_BOT_USERNAME_FINANCE_INVOICE_OPS=${TELEGRAM_BOT_USERNAME_FINANCE_INVOICE_OPS:-}
      - TELEGRAM_BOT_TOKEN_OFFICE_ASSISTANT=${TELEGRAM_BOT_TOKEN_OFFICE_ASSISTANT:-}
      - TELEGRAM_BOT_USERNAME_OFFICE_ASSISTANT=${TELEGRAM_BOT_USERNAME_OFFICE_ASSISTANT:-}
      - SLACK_CLIENT_ID=${SLACK_CLIENT_ID:-}
      - SLACK_CLIENT_SECRET=${SLACK_CLIENT_SECRET:-}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - avry-backend-data:/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=aivory-network"
      - "traefik.http.routers.backend.rule=(Host(`api.aivory.id`) || Host(`backend.aivory.id`)) && (PathPrefix(`/api/v1`) || PathPrefix(`/api/database`) || PathPrefix(`/api/debug`) || PathPrefix(`/health`))"
      - "traefik.http.routers.backend.entrypoints=web,websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.backend.priority=10"
      - "traefik.http.services.backend.loadbalancer.server.port=8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy

  # ── Blog API (port 8089 — /api/blog via Traefik priority=10) ──────────────
  avry-blog:
    build:
      context: ./services/avry-blog
      dockerfile: Dockerfile
    container_name: avry-blog
    restart: unless-stopped
    networks:
      - aivory-network
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=aivory-network"
      - "traefik.http.routers.blog.rule=PathPrefix(`/api/blog`)"
      - "traefik.http.routers.blog.entrypoints=web,websecure"
      - "traefik.http.routers.blog.tls.certresolver=letsencrypt"
      - "traefik.http.routers.blog.priority=10"
      - "traefik.http.services.blog.loadbalancer.server.port=8089"
      - "traefik.http.routers.blog.middlewares=blog-stripprefix"
      - "traefik.http.middlewares.blog-stripprefix.stripprefix.prefixes=/api/blog"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Careers API (port 8090 — /api/careers via Traefik priority=10) ────────
  avry-careers:
    build:
      context: ./services/avry-careers
      dockerfile: Dockerfile
    container_name: avry-careers
    restart: unless-stopped
    networks:
      - aivory-network
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - SMTP_HOST=${SMTP_HOST:-localhost}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-careers@aivory.id}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=aivory-network"
      - "traefik.http.routers.careers.rule=PathPrefix(`/api/careers`)"
      - "traefik.http.routers.careers.entrypoints=web,websecure"
      - "traefik.http.routers.careers.tls.certresolver=letsencrypt"
      - "traefik.http.routers.careers.priority=10"
      - "traefik.http.services.careers.loadbalancer.server.port=8090"
      - "traefik.http.routers.careers.middlewares=careers-stripprefix"
      - "traefik.http.middlewares.careers-stripprefix.stripprefix.prefixes=/api/careers"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Diagnostics (port 8082) ────────────────────────────────────────────────
  avry-diagnostics:
    build:
      context: ./services/avry-diagnostics
      dockerfile: Dockerfile
    container_name: avry-diagnostics
    restart: unless-stopped
    networks:
      - aivory-network
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8082/health',timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=aivory-network"
      - "traefik.http.routers.diagnostics.rule=Host(`api.aivory.id`) && PathPrefix(`/diagnostics`)"
      - "traefik.http.routers.diagnostics.entrypoints=web,websecure"
      - "traefik.http.routers.diagnostics.tls.certresolver=letsencrypt"
      - "traefik.http.routers.diagnostics.priority=10"
      - "traefik.http.services.diagnostics.loadbalancer.server.port=8082"
      - "traefik.http.routers.diagnostics.middlewares=diagnostics-stripprefix"
      - "traefik.http.middlewares.diagnostics-stripprefix.stripprefix.prefixes=/diagnostics"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Blueprint (port 8083) ──────────────────────────────────────────────────
  avry-blueprint:
    build:
      context: ./services/avry-blueprint
      dockerfile: Dockerfile
    container_name: avry-blueprint
    restart: unless-stopped
    networks:
      - aivory-network
    ports:
      - "8083:8083"
    environment:
      - PORT=8083
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8083/health',timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=aivory-network"
      - "traefik.http.routers.blueprint.rule=Host(`api.aivory.id`) && PathPrefix(`/blueprint`)"
      - "traefik.http.routers.blueprint.entrypoints=web,websecure"
      - "traefik.http.routers.blueprint.tls.certresolver=letsencrypt"
      - "traefik.http.routers.blueprint.priority=10"
      - "traefik.http.services.blueprint.loadbalancer.server.port=8083"
      - "traefik.http.routers.blueprint.middlewares=blueprint-stripprefix"
      - "traefik.http.middlewares.blueprint-stripprefix.stripprefix.prefixes=/blueprint"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Roadmap (port 8084) ────────────────────────────────────────────────────
  avry-roadmap:
    build:
      context: ./services/avry-roadmap
      dockerfile: Dockerfile
    container_name: avry-roadmap
    restart: unless-stopped
    networks:
      - aivory-network
    ports:
      - "8084:8084"
    environment:
      - PORT=8084
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8084/health',timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=aivory-network"
      - "traefik.http.routers.roadmap.rule=Host(`api.aivory.id`) && PathPrefix(`/roadmap`)"
      - "traefik.http.routers.roadmap.entrypoints=web,websecure"
      - "traefik.http.routers.roadmap.tls.certresolver=letsencrypt"
      - "traefik.http.routers.roadmap.priority=10"
      - "traefik.http.services.roadmap.loadbalancer.server.port=8084"
      - "traefik.http.routers.roadmap.middlewares=roadmap-stripprefix"
      - "traefik.http.middlewares.roadmap-stripprefix.stripprefix.prefixes=/roadmap"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Workflows (port 8082 internally, separate path) ────────────────────────
  avry-workflows:
    build:
      context: ./services/avry-workflows
      dockerfile: Dockerfile
    container_name: avry-workflows
    restart: unless-stopped
    networks:
      - aivory-network
    ports:
      - "8087:8087"
    environment:
      - PORT=8087
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8087/health',timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=aivory-network"
      - "traefik.http.routers.workflows.rule=Host(`api.aivory.id`) && PathPrefix(`/workflows`)"
      - "traefik.http.routers.workflows.entrypoints=web,websecure"
      - "traefik.http.routers.workflows.tls.certresolver=letsencrypt"
      - "traefik.http.routers.workflows.priority=10"
      - "traefik.http.services.workflows.loadbalancer.server.port=8087"
      - "traefik.http.routers.workflows.middlewares=workflows-stripprefix"
      - "traefik.http.middlewares.workflows-stripprefix.stripprefix.prefixes=/workflows"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Payments (port 3030) ───────────────────────────────────────────────────
  avry-payments:
    build:
      context: ./services/avry-payments
      dockerfile: Dockerfile
    container_name: avry-payments
    restart: unless-stopped
    networks:
      - aivory-network
    ports:
      - "3030:3030"
    environment:
      - PORT=3030
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - MIDTRANS_SERVER_KEY=${MIDTRANS_SERVER_KEY}
      - MIDTRANS_CLIENT_KEY=${MIDTRANS_CLIENT_KEY}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:3030/health',timeout=5).status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=aivory-network"
      - "traefik.http.routers.payments.rule=Host(`api.aivory.id`) && PathPrefix(`/payments`)"
      - "traefik.http.routers.payments.entrypoints=web,websecure"
      - "traefik.http.routers.payments.tls.certresolver=letsencrypt"
      - "traefik.http.routers.payments.priority=10"
      - "traefik.http.services.payments.loadbalancer.server.port=3030"
      - "traefik.http.routers.payments.middlewares=payments-stripprefix"
      - "traefik.http.middlewares.payments-stripprefix.stripprefix.prefixes=/payments"
    depends_on:
      postgres:
        condition: service_healthy

networks:
  aivory-network:
    external: true
  aivory_aivory-net:
    external: true

volumes:
  avry-backend-data:
  postgres_data: